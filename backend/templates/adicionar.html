{% extends "base.html" %}
{% block title %} — Adicionar Sintoma{% endblock %}

{% block body %}
<div class="screen screen--app">

  <!-- Header -->
  <header class="app-header">
    <a href="{{ url_for('calendario') }}" class="header-logo">
      <svg viewBox="0 0 56 50" fill="none">
        <rect x="2" y="8" width="52" height="40" rx="6" stroke="#1e6872" stroke-width="3.5"/>
        <rect x="10" y="2" width="9" height="12" rx="3" fill="#1e6872"/>
        <rect x="37" y="2" width="9" height="12" rx="3" fill="#1e6872"/>
        <line x1="2" y1="20" x2="54" y2="20" stroke="#1e6872" stroke-width="2.5"/>
        <rect x="22" y="28" width="12" height="4" rx="2" fill="#1e6872"/>
        <rect x="26" y="24" width="4" height="12" rx="2" fill="#1e6872"/>
      </svg>
    </a>
    <div class="header-user">
      <a href="{{ url_for('logout') }}" class="header-user__avatar">
        <svg viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="19" stroke="#1e6872" stroke-width="2"/>
          <circle cx="20" cy="16" r="7" fill="#1e6872"/>
          <path d="M6 36c0-7.732 6.268-14 14-14s14 6.268 14 14" fill="#1e6872"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- Indicador de chevron -->
  <div class="panel-handle">&#8964;</div>

  <!-- Formulário -->
  <div class="card-panel card-panel--form">
    <form method="POST" action="{{ url_for('adicionar') }}" id="add-form">

      <!-- Datas -->
      <div class="date-row">
        <span class="date-row__label">COMEÇA</span>
        <input class="date-row__date" type="date" name="inicio_date"
               value="{{ data_str }}" id="ini_date" />
        <input class="date-row__time" type="time" name="inicio_time"
               value="08:00" id="ini_time" />
      </div>
      <div class="date-row">
        <span class="date-row__label">TERMINA</span>
        <input class="date-row__date" type="date" name="fim_date"
               id="fim_date" />
        <input class="date-row__time" type="time" name="fim_time"
               id="fim_time" />
      </div>

      <!-- Hidden datetime fields -->
      <input type="hidden" name="inicio" id="inicio" />
      <input type="hidden" name="fim" id="fim" />

      <!-- Grade de sintomas -->
      <div class="symptom-grid" id="symptom-grid">
        {% for s in sintomas %}
          <button type="button"
                  class="symptom-tile{% if s.key == 'DOR' %} symptom-tile--selected{% endif %}"
                  data-key="{{ s.key }}"
                  onclick="selectSintoma(this)">
            <span class="symptom-tile__icon">{{ s.icon }}</span>
            <span class="symptom-tile__label">{{ s.label }}</span>
          </button>
        {% endfor %}
      </div>
      <input type="hidden" name="tipo" id="tipo" value="DOR" />

      <!-- Sub-opções para DOR -->
      <div class="subtipo-section" id="subtipo-section">
        <p class="subtipo-section__title">Tipo de dor:</p>
        <div class="subtipo-grid">
          {% for st in subtipos_dor %}
            <button type="button"
                    class="subtipo-btn"
                    data-val="{{ st }}"
                    onclick="selectSubtipo(this)">
              {{ st }}
            </button>
          {% endfor %}
        </div>
        <input type="hidden" name="subtipo" id="subtipo" />
      </div>

      <!-- Campo OUTRO -->
      <div class="outro-section" id="outro-section" style="display:none;">
        <textarea class="form-input" name="descricao" id="descricao"
                  rows="3" placeholder="Descreva o que sente..."></textarea>
      </div>

      <button class="btn btn--primary btn--full" type="submit"
              style="margin-top:1.5rem;" id="btn-add">
        ADICIONAR
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function selectSintoma(el) {
  document.querySelectorAll('.symptom-tile').forEach(t => t.classList.remove('symptom-tile--selected'));
  el.classList.add('symptom-tile--selected');
  const key = el.dataset.key;
  document.getElementById('tipo').value = key;

  document.getElementById('subtipo-section').style.display = (key === 'DOR')    ? '' : 'none';
  document.getElementById('outro-section').style.display   = (key === 'OUTRO')  ? '' : 'none';
}

function selectSubtipo(el) {
  document.querySelectorAll('.subtipo-btn').forEach(b => b.classList.remove('subtipo-btn--selected'));
  el.classList.add('subtipo-btn--selected');
  document.getElementById('subtipo').value = el.dataset.val;
}

document.getElementById('add-form').addEventListener('submit', function(e) {
  const iniD = document.getElementById('ini_date').value;
  const iniT = document.getElementById('ini_time').value;
  const fimD = document.getElementById('fim_date').value;
  const fimT = document.getElementById('fim_time').value;

  if (!iniD || !iniT) { e.preventDefault(); alert('Informe a data e hora de início.'); return; }
  document.getElementById('inicio').value = iniD + 'T' + iniT;
  if (fimD && fimT) {
    document.getElementById('fim').value = fimD + 'T' + fimT;
  }
});
</script>
{% endblock %}
