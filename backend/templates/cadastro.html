{% extends "base.html" %}
{% block title %} — Cadastro{% endblock %}

{% block body %}
<div class="screen screen--auth">
  <div class="auth-top auth-top--sm">
    <a class="back-btn" href="{{ url_for('login') }}">&#8249;</a>
  </div>

  <div class="auth-card auth-card--tall">
    <h1 class="auth-card__title">CADASTRO</h1>

    <form method="POST" action="{{ url_for('cadastro') }}" novalidate>
      <div class="form-group">
        <label class="form-label" for="nome">Nome completo</label>
        <input
          class="form-input"
          type="text"
          id="nome"
          name="nome"
          placeholder="Seu nome"
          required
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input
          class="form-input"
          type="email"
          id="email"
          name="email"
          placeholder="seu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="senha">Senha</label>
        <input
          class="form-input"
          type="password"
          id="senha"
          name="senha"
          placeholder="Mínimo 6 caracteres"
          required
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmar_senha">Confirmar senha</label>
        <input
          class="form-input"
          type="password"
          id="confirmar_senha"
          name="confirmar_senha"
          placeholder="Repita a senha"
          required
          autocomplete="new-password"
        />
      </div>

      <button class="btn btn--primary btn--full" type="submit" style="margin-top:1.5rem;">
        Criar conta
      </button>
    </form>
  </div>
</div>
{% endblock %}
